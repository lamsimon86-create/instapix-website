    <pattern id="highlight" x="0" y="0" width="90" height="90" patternUnits="userSpaceOnUse">
      <g transform="translate(0.8,0.8)" opacity="0.5">
        <path d="M45,25 Q49,37 45,45 Q41,37 45,25Z" fill="none" stroke="#ffffff" stroke-width="0.7"/>
        <path d="M45,65 Q49,53 45,45 Q41,53 45,65Z" fill="none" stroke="#ffffff" stroke-width="0.7"/>
        <path d="M25,45 Q37,41 45,45 Q37,49 25,45Z" fill="none" stroke="#ffffff" stroke-width="0.7"/>
        <path d="M65,45 Q53,41 45,45 Q53,49 65,45Z" fill="none" stroke="#ffffff" stroke-width="0.7"/>
        <circle cx="45" cy="45" r="0.8" fill="#ffffff"/>
      </g>
    </pattern>
    <!-- Main pattern (emboss shadow) -->
    <pattern id="shadow" x="0" y="0" width="90" height="90" patternUnits="userSpaceOnUse">
      <path d="M45,25 Q49,37 45,45 Q41,37 45,25Z" fill="none" stroke="#0b1f14" stroke-width="0.7" opacity="0.4"/>
      <path d="M45,65 Q49,53 45,45 Q41,53 45,65Z" fill="none" stroke="#0b1f14" stroke-width="0.7" opacity="0.4"/>
      <path d="M25,45 Q37,41 45,45 Q37,49 25,45Z" fill="none" stroke="#0b1f14" stroke-width="0.7" opacity="0.4"/>
      <path d="M65,45 Q53,41 45,45 Q53,49 65,45Z" fill="none" stroke="#0b1f14" stroke-width="0.7" opacity="0.4"/>
      <circle cx="45" cy="45" r="0.8" fill="#0b1f14" opacity="0.4"/>
    </pattern>
  </defs>
  <rect width="800" height="800" fill="url(#highlight)"/>
  <rect width="800" height="800" fill="url(#shadow)"/>
</svg>